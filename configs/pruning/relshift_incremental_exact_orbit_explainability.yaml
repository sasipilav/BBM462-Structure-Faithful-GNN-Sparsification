method: relshift
rho: 0.05
score_mode: relative
d_min: 2
guard_bridges: true
backend: orca
eps: 1.0e-8

relshift_engine: incremental_sequential_exact
use_score_cache: true
candidate_delta_cache_enabled: true
write_edge_scores: false
use_native_graph_state: true
native_state_fusion: true

incremental_selection_backend: versioned_heap
heap_storage_mode: indexed
heap_rebuild_ratio: 4.0
bridge_maintenance_mode: lazy_exact
adjacency_compaction_threshold: 0.20

# Phase 2 selected-edge events and full-graph orbit checkpoints.
# Requires artifact_dir at runtime. Initial and final achieved states are always
# included; fractions above rho are ignored and duplicate integer edge counts
# are coalesced.
orbit_explainability_enabled: true
orbit_checkpoint_rhos: [0.0, 0.01, 0.02, 0.05, 0.10, 0.15, 0.20, 0.30]
# Full [checkpoint, node, orbit] snapshots are optional because they can be large.
orbit_checkpoint_store_node_snapshots: false

profile_rounds: false
write_runtime_profile: false
profile_memory: false
profile_update_diagnostics: false
profile_native_kernel: false
native_omp_threads: 1
